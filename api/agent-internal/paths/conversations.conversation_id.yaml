parameters:
  - $ref: ../parameters/conversation_id.yaml
get:
  operationId: getConversation
  parameters:
    - name: turn_id
      in: query
      required: false
      description: If provided, limit the response to only this turn
      schema:
        type: string
    - name: metadata
      in: query
      required: false
      description: If true, include server-side execution metadata on each turn
      schema:
        type: boolean
  responses:
    '200':
      description: Conversation retrieved successfully
      content:
        application/json:
          schema:
            $ref: ../schemas/ConversationDetails.yaml
post:
  operationId: createConversation
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../schemas/CreateConversationRequest.yaml
  responses:
    '200':
      description: Command executed successfully
      content:
        application/json:
          schema:
            oneOf:
              - $ref: ../schemas/Conversation.yaml
              - $ref: ../schemas/Turn.yaml
    '202':
      description: Streaming response
      content:
        text/event-stream:
          schema:
            type: string
put:
  operationId: conversationTurn
  requestBody:
    content:
      application/json:
        schema:
          type: object
          required:
            - turn
            - client
          properties:
            response:
              type: string
              description: Controls whether to wait for the agent response, stream it, or return immediately
              enum:
                - none
                - stream
                - complete
            client:
              $ref: ../schemas/ClientInfo.yaml
            turn:
              $ref: ../schemas/TurnInput.yaml
  responses:
    '200':
      description: Turn executed successfully
      content:
        application/json:
          schema:
            $ref: ../schemas/Turn.yaml
    '202':
      description: Streaming response
      content:
        text/event-stream:
          schema:
            type: string
    '206':
      description: Tool response triggered another round of client interaction
      content:
        application/json:
          schema:
            $ref: ../schemas/DeferredToolResponse.yaml
patch:
  operationId: updateConversation
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            system_prompt:
              type: string
            model:
              type: string
  responses:
    '200':
      description: Conversation updated successfully
      content:
        application/json:
          schema:
            $ref: ../schemas/Conversation.yaml
