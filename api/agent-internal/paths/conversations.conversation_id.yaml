parameters:
  - $ref: ../parameters/conversation_id.yaml
get:
  operationId: getConversation
  parameters:
    - name: metadata
      in: query
      required: false
      description: If true, include server-side execution metadata on turns
      schema:
        type: boolean
  responses:
    '200':
      description: Success
      content:
        application/json:
          schema:
            $ref: ../schemas/ConversationDetails.yaml
    '404':
      description: Not Found
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
post:
  operationId: addTurn
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../schemas/TurnInput.yaml
  responses:
    '200':
      description: Success
      content:
        application/json:
          schema:
            $ref: ../schemas/Turn.yaml
    '404':
      description: Not Found
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
put:
  operationId: createConversation
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../schemas/CreateConversationRequest.yaml
  responses:
    '200':
      description: Success
      content:
        application/json:
          schema:
            $ref: ../schemas/ConversationDetails.yaml
    '400':
      description: Bad Request
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
delete:
  operationId: deleteConversation
  responses:
    '200':
      description: Success
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
patch:
  operationId: updateConversation
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../schemas/ConversationOptions.yaml
  responses:
    '200':
      description: Success
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
    '404':
      description: Not Found
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
