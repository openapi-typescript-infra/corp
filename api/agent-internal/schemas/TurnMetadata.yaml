type: object
description: Server-side metadata about a turn's execution
properties:
  status:
    type: string
    enum:
      - pending
      - streaming
      - input-required
      - complete
      - failed
  model:
    type: string
  error:
    type: string
  finish_reason:
    type: string
  raw_finish_reason:
    type: string
  input_tokens:
    type: number
  output_tokens:
    type: number
  total_latency_ms:
    type: number
  started_at:
    type: string
    format: date-time
  completed_at:
    type: string
    format: date-time
  extra_data:
    type: object
    additionalProperties: true
  stored_messages:
    type: array
    items:
      $ref: ../schemas/ConversationStoredMessage.yaml
