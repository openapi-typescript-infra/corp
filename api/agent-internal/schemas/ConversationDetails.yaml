type: object
description: A conversation with all stored turns and messages
required:
  - conversation_id
  - turns
properties:
  conversation_id:
    type: string
  status:
    type: string
    enum:
      - running
      - completed
      - failed
  error:
    type: string
  system_prompt:
    type: string
  created_at:
    type: string
    format: date-time
  updated_at:
    type: string
    format: date-time
  extra_data:
    type: object
    additionalProperties: true
  turns:
    type: array
    items:
      $ref: ../schemas/Turn.yaml
