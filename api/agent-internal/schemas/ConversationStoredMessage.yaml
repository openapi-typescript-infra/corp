type: object
required:
  - role
  - content
properties:
  role:
    type: string
    enum:
      - user
      - assistant
      - system
      - tool
  content:
    oneOf:
      - type: string
      - type: array
        items:
          $ref: TurnMessageContentPart.yaml
  tool_calls:
    type: array
    items:
      $ref: ToolCall.yaml
  tool_call_id:
    type: string
