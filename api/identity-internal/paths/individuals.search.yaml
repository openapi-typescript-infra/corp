post:
  operationId: searchIndividualsByIdentifiers
  summary: Search for individuals by structured identifier inputs
  description: |
    This is exposed as a POST because the request body contains structured
    IdentifierInput objects that don't map cleanly to query parameters.
  parameters:
    - $ref: ../params/address_types.yaml
    - $ref: ../params/consents.yaml
    - $ref: ../params/identifier_namespaces.yaml
    - $ref: ../params/individual_fields.yaml
    - $ref: ../params/profiles.yaml
    - $ref: ../params/relation_identifiers.yaml
    - $ref: ../params/relation_types.yaml
    - $ref: ../params/groups.yaml
    - $ref: ../params/tags.yaml
  requestBody:
    description: A set of structured identifiers to search for
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - identifiers
          properties:
            identifiers:
              type: array
              maxItems: 100
              items:
                $ref: ../schemas/IdentifierInput.yaml
  responses:
    200:
      description: One or more individuals were found
      content:
        application/json:
          schema:
            type: object
            required:
              - matches
              - individuals
            properties:
              matches:
                type: object
                description: |
                  A map from each input identifier (formatted as "namespace:identifier") to
                  the individual_uuid it resolved to. Multiple keys may point to the same uuid.
                additionalProperties:
                  type: string
                  format: uuid
              individuals:
                type: array
                maxItems: 100
                items:
                  $ref: ../schemas/Individual.yaml
    404:
      description: There were no matching individuals found
      content:
        application/json:
          schema:
            $ref: ../../common/Error.yaml
