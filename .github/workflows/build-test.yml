name: Build, check and test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write

env:
  # Activates `mise.ci.toml` overrides on top of `mise.toml`. Single source of
  # truth for tool versions and env vars; CI-specific values live in
  # `mise.ci.toml`.
  MISE_ENV: ci

jobs:
  build-check-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: 🧰 Setup mise (tools + env)
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0

      - name: 🐘 Start CI Postgres
        run: |
          docker run -d --name ci-postgres-${{ github.run_id }} \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            -p 25432:5432 \
            ghcr.io/openapi-typescript-infra/pg-postgis-plv8:main
          # Wait for Postgres to be ready
          for i in $(seq 1 30); do
            if pg_isready -h localhost -p 25432 -U postgres 2>/dev/null; then
              echo "Postgres is ready"
              break
            fi
            sleep 1
          done

      - id: auth
        if: vars.GCP_PROJECT_NUMBER != '' && vars.GCP_PROJECT_ID != ''
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-actions/providers/github-oidc
          service_account: github-actions-ci@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com

      - name: ♻️ Cache yarn fetch
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            .yarn/cache
            .yarn/install-state.gz
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock', '.yarnrc.yml') }}
          restore-keys: yarn-${{ runner.os }}-

      - name: 📦 Install dependencies
        run: yarn install --immutable

      - name: ♻️ Turbo remote cache (GitHub-backed)
        uses: rharkor/caching-for-turbo@5d14fba18e450c09393333cfd4242e8b3cb455a6 # v2.4.2

      - name: 🏗️ Build, typecheck, lint
        run: |
          yarn workspaces foreach -pt run ci-setup
          yarn turbo run build typecheck lint

      - name: 📦 Check bundle sizes
        env:
          APP_ENV: production
        run: yarn turbo run check-bundles --filter=@justtellme/consumer-web

      - name: 🧹 Cleanup CI Postgres
        if: always()
        run: docker rm -f ci-postgres-${{ github.run_id }} || true
