{{- if gt (len .Values.mappings) 0 -}}
{{- $root := . -}}
{{- $defaultGateway := default (printf "%s-gateway" $root.Values.gcp.env) $root.Values.gateway.name -}}
{{- $defaultGatewayNs := default "envoy-gateway-system" $root.Values.gateway.namespace -}}
{{- range $key, $value := .Values.mappings }}
{{- $gatewayName := default $defaultGateway $value.gateway -}}
{{- $gatewayNs := default $defaultGatewayNs $value.gatewayNamespace -}}
{{- $service := default $root.Values.name $value.service -}}
{{- $port := default 80 $value.port }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $root.Values.name }}-{{ $key }}
  namespace: {{ $root.Release.Namespace }}
spec:
  parentRefs:
    - name: {{ $gatewayName }}
      namespace: {{ $gatewayNs }}
  {{- if $value.hostnames }}
  hostnames:
    {{- range $value.hostnames }}
    - {{ . | quote }}
    {{- end }}
  {{- end }}
  rules:
    - matches:
        - path:
            {{- if hasKey $value "pathRegex" }}
            type: RegularExpression
            value: {{ $value.pathRegex | quote }}
            {{- else }}
            type: PathPrefix
            value: {{ default "/" $value.prefix | quote }}
            {{- end }}
      {{- $hasRewrite := hasKey $value "rewrite" -}}
      {{- $hasHeaders := hasKey $value "headers" -}}
      {{- if or $hasRewrite $hasHeaders }}
      filters:
        {{- if $hasRewrite }}
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: {{ $value.rewrite | quote }}
        {{- end }}
        {{- if $hasHeaders }}
        - type: RequestHeaderModifier
          requestHeaderModifier:
            add:
              {{- range $hk, $hv := $value.headers }}
              - name: {{ $hk | quote }}
                value: {{ $hv | quote }}
              {{- end }}
        {{- end }}
      {{- end }}
      backendRefs:
        - name: {{ $service }}
          port: {{ $port }}
      {{- if hasKey $value "timeout" }}
      timeouts:
        request: {{ printf "%dms" (int $value.timeout) | quote }}
      {{- end }}
{{- if or (hasKey $value "retry") (hasKey $value "idleTimeout") (hasKey $value "responseOverrides") }}
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: {{ $root.Values.name }}-{{ $key }}
  namespace: {{ $root.Release.Namespace }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: {{ $root.Values.name }}-{{ $key }}
  {{- if hasKey $value "retry" }}
  retry:
    numRetries: {{ default 2 $value.retry.attempts }}
    retryOn:
      triggers:
        {{- range (default (list "5xx") $value.retry.triggers) }}
        - {{ . | quote }}
        {{- end }}
  {{- end }}
  {{- if hasKey $value "idleTimeout" }}
  timeout:
    http:
      connectionIdleTimeout: {{ printf "%dms" (int $value.idleTimeout) | quote }}
  {{- end }}
  {{- if hasKey $value "responseOverrides" }}
  responseOverride:
    {{- range $code, $spec := $value.responseOverrides }}
    - match:
        statusCodes:
          - type: Value
            value: {{ $code | int }}
      response:
        contentType: {{ default "text/html" $spec.contentType | quote }}
        body:
          type: Inline
          inline: {{ $spec.body | quote }}
    {{- end }}
  {{- end }}
{{- end }}
{{- end }}
{{- end -}}
