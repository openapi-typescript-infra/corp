apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}
  annotations:
    kubernetes.io/change-cause: {{ default "unknown" .Values.changeCause | quote }}
spec:
  revisionHistoryLimit: 5
  minReadySeconds: 20
  selector:
    matchLabels:
      app: {{ .Values.name }}
  {{- if not .Values.autoscale.enabled }}
  replicas: {{ default (ternary 1 2 (eq .Values.gcp.env "development")) .Values.replicaCount }}
  {{- end }}
  strategy:
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 50%
  template:
    metadata:
      labels:
        team: {{ .Values.team }}
        app: {{ .Values.name }}
        {{- if not ( index .Values "logging" "logz.io" ) }}
        no-logz-io: "true"
        {{- end }}
    spec:
      serviceAccountName: {{ include "base-service.serviceAccountName" . }}
      containers:
        - name: {{ .Values.name }}
          imagePullPolicy: IfNotPresent
          image: "{{ .Values.image.registry }}/{{ .Values.gcp.project }}/{{ .Values.image.repository }}/{{ .Values.name }}:{{ .Values.tag }}"
          resources:
            requests:
            {{- if .Values.resources.cpu.requests }}
              cpu: {{ .Values.resources.cpu.requests }}
            {{- end -}}
            {{- if .Values.resources.memory.requests }}
              memory: {{ .Values.resources.memory.requests }}
            {{- end }}
            limits:
            {{- if .Values.resources.cpu.limits }}
              cpu: {{ .Values.resources.cpu.limits }}
            {{- end -}}
            {{- if .Values.resources.memory.limits }}
              memory: {{ .Values.resources.memory.limits }}
            {{- end }}
          env:
            {{- if eq .Values.tracing.enabled false }}
            - name: DISABLE_OLTP_EXPORTER
              value: "true"
            {{- else }}
            - name: OTLP_EXPORTER
              value: {{ .Values.tracing.otlp_exporter }}
            {{- end }}
            - name: GCP_REGION
              value: {{ .Values.gcp.region | default "us-central1" }}
            - name: NODE_ENV
              value: production
            - name: APP_ENV
              value: {{ ternary "staging" "production" (eq .Values.gcp.env "development") }}
            {{- if .Values.database.gcpId }}
            - name: DATABASE_ID
              value: "{{ .Values.gcp.project }}:{{ default "us-central1" .Values.database.region }}:{{ default (printf "%s-pg-%s" .Values.gcp.env .Values.database.gcpId) .Values.database.instance }}"
            {{- end }}
            {{- include "base-service.env" . | trimSuffix "\n" | indent 12 }}
          ports:
            - containerPort: 3000
              protocol: TCP
            - containerPort: 8000
              protocol: TCP
          readinessProbe:
            initialDelaySeconds: 15
            httpGet:
              path: /health
              port: 3000
          livenessProbe:
            initialDelaySeconds: 15
            httpGet:
              path: /health
              port: 3000
          {{- if eq .Values.startupProbe.enabled true }}
          startupProbe:
            initialDelaySeconds: {{ .Values.startupProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.startupProbe.periodSeconds }}
            failureThreshold: {{ .Values.startupProbe.failureThreshold }}
            successThreshold: {{ .Values.startupProbe.successThreshold }}
            timeoutSeconds: {{ .Values.startupProbe.timeoutSeconds }}
            httpGet:
              path: /health
              port: 3000
          {{- end }}
          {{- if .Values.volumeMounts }}
          volumeMounts:
          {{- range .Values.volumeMounts }}
          - {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- end }}
        {{- if .Values.sidecars }}
        {{- range .Values.sidecars }}
        - {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- end }}
      {{- if .Values.volumes }}
      volumes:
      {{- toYaml .Values.volumes | nindent 10 }}
      {{- end }}
      {{- if .Values.tolerations }}
      tolerations:
      {{- toYaml .Values.tolerations | nindent 8 }}
      {{- end }}
      {{- if .Values.nodeSelector }}
      nodeSelector:
      {{- toYaml .Values.nodeSelector | nindent 8 }}
      {{- end }}
      {{- $replicas := default (ternary 1 2 (eq .Values.gcp.env "development")) .Values.replicaCount }}
      {{- if or .Values.autoscale.enabled (gt (int $replicas) 1) }}
      # Only render anti-affinity when spread is meaningful (HPA on or replicas > 1).
      # Single-replica deploys can't be spread, and GKE Autopilot's
      # autogke-pod-limit-constraints webhook rejects pods that declare
      # podAntiAffinity with CPU requests below 500m.
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - {{ .Values.name }}
              topologyKey: kubernetes.io/hostname
      {{- end }}
