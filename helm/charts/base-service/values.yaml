# yaml-language-server: $schema=../../docs/html/Values.schema.json

serviceAccount: {}

resources:
  cpu:
    requests: 100m
  memory:
    requests: 500Mi
    limits: 500Mi

database: {}

monitoring:
  enabled: true

logging:
  logz.io: true

# Gateway API parent for HTTPRoutes generated from `mappings`.
# Defaults to "{gcp.env}-gateway" in envoy-gateway-system, matching the
# Gateway provisioned by terraform/infra/modules/envoy_gateway.
gateway:
  name: ""
  namespace: envoy-gateway-system

# Each entry under `mappings` produces an HTTPRoute (and a BackendTrafficPolicy
# when retry / idleTimeout / responseOverrides are set). Supported fields:
#   prefix: /api/v1                  # PathPrefix match (default "/")
#   pathRegex: ^/foo/(.*)$           # RegularExpression match (mutex with prefix)
#   service: my-service              # backend service (default .Values.name)
#   port: 80                         # backend port (default 80)
#   hostnames: ["api.example.com"]   # optional host filter
#   gateway: prod-gateway            # override parent gateway
#   gatewayNamespace: envoy-gateway-system
#   rewrite: /                       # URLRewrite ReplacePrefixMatch
#   headers:                         # add to upstream request
#     x-foo: bar
#   timeout: 30000                   # request timeout, ms
#   retry:
#     attempts: 3                    # default 2
#     triggers: ["5xx", "gateway-error"]   # default ["5xx"]
#   idleTimeout: 60000               # http connection idle timeout, ms
#   responseOverrides:
#     "404":
#       contentType: text/html
#       body: |
#         <html>404</html>
mappings: {}

gcp: {}

api:
  advertise: true

temporal:
  resources:
    cpu: {}
    memory: {}
  env:
    TEMPORAL_CLUSTER: temporal-frontend.jtm.svc.cluster.local:7233

tracing:
  enabled: true
  otlp_exporter: http://otel.monitoring.svc.cluster.local:4318/v1/traces

autoscale:
  enabled: false
  maxReplicas: 10
  minReplicas: 1
  additionalContainerEnabled: false
  additionalContainerName: ""
  additionalContainerTargetCPUUtilizationPercentage:
  additionalContainerTargetMemoryUtilizationPercentage:
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 70
  down:
    stabilizationWindowSeconds: 300
    policies:
      pods:
        value: 1
        periodSeconds: 60
      percent:
        value: 100
        periodSeconds: 60
      selectPolicy: Min
  up:
    stabilizationWindowSeconds: 0
    policies:
      pods:
        value: 4
        periodSeconds: 15
      percent:
        value: 100
        periodSeconds: 15
      selectPolicy: Max

podDisruptionBudget:
  enabled: false
  minAvailable: 50%

startupProbe:
  enabled: false
  initialDelaySeconds: 0
  periodSeconds: 10
  failureThreshold: 9
  successThreshold: 1
  timeoutSeconds: 1
