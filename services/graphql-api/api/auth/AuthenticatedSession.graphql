"An authenticated session with a token for API requests."
type AuthenticatedSession {
  "The session id when the session was established by graphql-api."
  id: ID
  "The UTC date and time when the token will expire."
  expiration: DateTime
  "The individual on whose behalf the session is authenticated"
  individual: AuthenticatableIndividual
  "A Bearer token that can be used to authenticate requests"
  token: String!
}

"The ways someone can prove their identity to access the service."
enum CredentialType {
  "Apple can be used to login"
  APPLE
  "Google can be used to login"
  GOOGLE
  "A passkey can be used to login"
  PASSKEY
  "A password can be used to login"
  PASSWORD
  "A code can be sent to an email address"
  EMAIL_CODE
  "A login link can be sent to an email address"
  EMAIL_LINK
  "A code can be sent to a phone number via SMS"
  SMS_CODE
  "A time based one-time password can be used to additionally secure login"
  TOTP
}

"Options available for creating an authenticated session."
type AuthenticatedSessionParameters {
  "The type of credentials that can be used to authenticate"
  credentialTypes: [CredentialType!]!
}
